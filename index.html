<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout con Grid</title>
    <link rel="stylesheet" href="stylos.css">
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>Mi sitio web</h1>
        </header>
        <nav>
            <ul>
                <li>Inicio</li>
                <li>Servicios</li>
                <li>Productos</li>
                <li>Contacto</li>
            </ul>
        </nav>
        <main>
            <h2>Contenido principal</h2>
            <div class="tarjetas">
                <div class="card">Tarjeta 1</div>
                <div class="card">Tarjeta 2</div>
                <div class="card">Tarjeta 3</div>
            </div>
        </main>
        <aside>
            <h3>Barra lateral</h3>
            <p>Información adicional</p>
        </aside>
        <footer>
            <p>© 2026 - Mi sitio</p>
        </footer>
    </div>
</body>
</html>
